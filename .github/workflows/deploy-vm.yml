name: Test and Deploy VM

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: vm-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  secrets-scan:
    name: Secrets scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: 'false'

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

  deploy-vm:
    name: Deploy VM
    runs-on: ubuntu-latest
    needs:
      - secrets-scan
      - test
    if: github.ref == 'refs/heads/main'
    env:
      VM_HOST: ${{ secrets.VM_HOST }}
      VM_USER: ${{ secrets.VM_USER }}
      VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
      VM_SSH_PORT: ${{ secrets.VM_SSH_PORT || '22' }}
    steps:
      - name: Skip deploy when VM secrets are missing
        if: env.VM_HOST == '' || env.VM_USER == '' || env.VM_SSH_KEY == ''
        run: echo "VM deploy secrets are not configured; skipping deploy."

      - name: Configure SSH
        if: env.VM_HOST != '' && env.VM_USER != '' && env.VM_SSH_KEY != ''
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VM_SSH_KEY" > ~/.ssh/vm_deploy_key
          chmod 600 ~/.ssh/vm_deploy_key
          ssh-keyscan -p "$VM_SSH_PORT" -H "$VM_HOST" >> ~/.ssh/known_hosts

      - name: Deploy backend on VM
        if: env.VM_HOST != '' && env.VM_USER != '' && env.VM_SSH_KEY != ''
        run: |
          set +e
          ssh -i ~/.ssh/vm_deploy_key -p "$VM_SSH_PORT" "$VM_USER@$VM_HOST" \
            'sudo systemctl start yclients-auto-deploy.service'
          deploy_status=$?
          ssh -i ~/.ssh/vm_deploy_key -p "$VM_SSH_PORT" "$VM_USER@$VM_HOST" \
            'sudo journalctl -u yclients-auto-deploy.service -n 120 --no-pager'
          exit "$deploy_status"

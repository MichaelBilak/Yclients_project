server {
    listen 80;
    server_name bi.your-domain.com;

    # Для получения SSL-сертификата Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Перенаправление HTTP -> HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name bi.your-domain.com;

    # Пути к SSL-сертификатам (создаются certbot)
    ssl_certificate     /etc/nginx/ssl/live/bi.your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/bi.your-domain.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    location /yclients-api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://metabase:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

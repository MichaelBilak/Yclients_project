<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YClients Dashboard</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.4;
      color: #172033;
      background: #f5f7fb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 320px;
      background: #f5f7fb;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .subhead {
      margin: 8px 0 0;
      color: #64748b;
      font-size: 14px;
    }

    .status {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      min-width: 190px;
      color: #64748b;
      font-size: 13px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 28px;
      padding: 4px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      background: #ffffff;
      color: #334155;
      white-space: nowrap;
    }

    .pill::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #94a3b8;
    }

    .pill.ok::before { background: #16a34a; }
    .pill.warn::before { background: #f59e0b; }
    .pill.error::before { background: #dc2626; }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(150px, 1fr) minmax(150px, 1fr) minmax(240px, 1.6fr) auto;
      gap: 12px;
      align-items: end;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid #dbe3ef;
      border-radius: 8px;
      background: #ffffff;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tab {
      display: inline-flex;
      min-height: 36px;
      align-items: center;
      padding: 7px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #ffffff;
      color: #334155;
      font-weight: 700;
      text-decoration: none;
    }

    .tab.active {
      border-color: #0f766e;
      background: #e6fffb;
      color: #0f766e;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      color: #64748b;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    input,
    select {
      width: 100%;
      min-height: 40px;
      padding: 8px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #ffffff;
      color: #172033;
    }

    button {
      min-height: 40px;
      padding: 8px 14px;
      border: 0;
      border-radius: 6px;
      background: #0f766e;
      color: #ffffff;
      cursor: pointer;
      font-weight: 700;
    }

    button:disabled {
      opacity: 0.65;
      cursor: wait;
    }

    .alert {
      display: none;
      margin-bottom: 16px;
      padding: 12px 14px;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      background: #fef2f2;
      color: #991b1b;
      font-size: 14px;
      white-space: pre-wrap;
    }

    .alert.visible { display: block; }

    .kpi {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .card,
    .panel {
      border: 1px solid #dbe3ef;
      border-radius: 8px;
      background: #ffffff;
    }

    .card {
      min-height: 116px;
      padding: 14px;
    }

    .label {
      color: #64748b;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .value {
      margin-top: 8px;
      font-size: clamp(24px, 3vw, 34px);
      font-weight: 750;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .delta {
      margin-top: 8px;
      color: #64748b;
      font-size: 13px;
    }

    .delta.up { color: #15803d; }
    .delta.down { color: #b91c1c; }

    .grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 16px;
      align-items: start;
    }

    .panel {
      min-width: 0;
      padding: 16px;
    }

    .panel.wide {
      grid-column: 1 / -1;
    }

    .panel-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 12px;
    }

    h2 {
      margin: 0;
      font-size: 16px;
      letter-spacing: 0;
    }

    .meta {
      color: #64748b;
      font-size: 13px;
      text-align: right;
    }

    .chart-box {
      position: relative;
      height: 320px;
    }

    .chart-box.short {
      height: 270px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th,
    td {
      padding: 10px 8px;
      border-bottom: 1px solid #e2e8f0;
      text-align: left;
      vertical-align: top;
    }

    th {
      color: #64748b;
      font-size: 12px;
      text-transform: uppercase;
    }

    td.number,
    th.number {
      text-align: right;
      white-space: nowrap;
    }

    .table-scroll {
      overflow-x: auto;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
    }

    .table-scroll table {
      min-width: 1180px;
    }

    .plan-table th,
    .plan-table td {
      border-right: 1px solid #e2e8f0;
    }

    .plan-table th:last-child,
    .plan-table td:last-child {
      border-right: 0;
    }

    .branch-cell {
      width: 120px;
      color: #172033;
      font-weight: 800;
      vertical-align: middle;
      background: #f8fafc;
    }

    .row-label {
      width: 120px;
      color: #334155;
      font-weight: 700;
      white-space: nowrap;
    }

    .plan-section + .plan-section {
      margin-top: 18px;
    }

    .plan-section-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 10px;
    }

    .plan-section-title h3 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0;
    }

    .metric-status.ok { background: #dcfce7; color: #166534; }
    .metric-status.warn { background: #ffedd5; color: #9a3412; }
    .metric-status.bad { background: #fee2e2; color: #991b1b; }
    .metric-status.no-plan { background: #f1f5f9; color: #64748b; }

    .empty {
      min-height: 160px;
      display: grid;
      place-items: center;
      color: #64748b;
      border: 1px dashed #cbd5e1;
      border-radius: 8px;
      text-align: center;
      padding: 16px;
    }

    @media (max-width: 900px) {
      .topbar {
        flex-direction: column;
      }

      .status {
        align-items: flex-start;
      }

      .toolbar {
        grid-template-columns: 1fr 1fr;
      }

      .toolbar button {
        grid-column: 1 / -1;
      }

      .kpi {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .shell {
        width: min(100% - 20px, 1180px);
        padding-top: 16px;
      }

      .toolbar,
      .kpi {
        grid-template-columns: 1fr;
      }

      .chart-box,
      .chart-box.short {
        height: 260px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="topbar">
      <div>
        <h1>YClients Dashboard</h1>
        <p class="subhead" id="period-label">Метрики по филиалам и услугам</p>
      </div>
      <div class="status">
        <span class="pill warn" id="api-state">API: проверка</span>
        <span id="sync-state">Синхронизация: нет данных</span>
      </div>
    </section>

    <nav class="tabs" aria-label="Разделы дашборда">
      <a class="tab active" href="#overview" data-view-link="overview">Обзор</a>
      <a class="tab" href="#plan-fact" data-view-link="plan">План / факт</a>
    </nav>

    <section class="toolbar" aria-label="Фильтры дашборда">
      <label>
        С
        <input type="date" id="start" />
      </label>
      <label>
        По
        <input type="date" id="end" />
      </label>
      <label>
        Филиал
        <select id="branch">
          <option value="">Все филиалы</option>
        </select>
      </label>
      <button type="button" id="load">Обновить</button>
    </section>

    <div class="alert" id="error"></div>

    <section class="view active" id="overview-view" data-view="overview">
      <section class="kpi" id="kpi"></section>

      <section class="grid">
        <div class="panel wide">
          <div class="panel-title">
            <h2>Выручка по дням</h2>
            <span class="meta" id="revenue-meta"></span>
          </div>
          <div class="chart-box"><canvas id="revenue-chart"></canvas></div>
        </div>

        <div class="panel">
          <div class="panel-title">
            <h2>Записи по дням</h2>
            <span class="meta" id="appointments-meta"></span>
          </div>
          <div class="chart-box short"><canvas id="appointments-chart"></canvas></div>
        </div>

        <div class="panel">
          <div class="panel-title">
            <h2>Топ услуг</h2>
            <span class="meta" id="services-meta"></span>
          </div>
          <div class="chart-box short"><canvas id="services-chart"></canvas></div>
        </div>

        <div class="panel wide">
          <div class="panel-title">
            <h2>Услуги с максимальной выручкой</h2>
            <span class="meta" id="table-meta"></span>
          </div>
          <div id="services-table"></div>
        </div>
      </section>
    </section>

    <section class="view" id="plan-view" data-view="plan">
      <div class="panel wide">
        <div class="panel-title">
          <h2>План / факт</h2>
          <span class="meta" id="plan-meta"></span>
        </div>
        <div id="plan-fact-table"></div>
      </div>
    </section>
  </main>
  <script type="module" src="/src/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Восстановление пароля</title>
  <link rel="stylesheet" href="/src/auth.css" />
</head>
<body class="auth-page auth-page--forgot">
  <div class="auth-layout">
    <aside class="auth-brand">
      <div class="auth-brand__logo">
        <span class="auth-brand__mark">Y</span>
        <span>YClients Portal</span>
      </div>
      <div class="auth-brand__content">
        <h2>Восстановление доступа</h2>
        <p>Мы отправим одноразовую ссылку на ваш email. Ссылка действует ограниченное время.</p>
      </div>
    </aside>

    <main class="auth-panel">
      <section class="auth-card">
        <div class="auth-mobile-logo">
          <span class="auth-brand__mark">Y</span>
          <span>YClients Portal</span>
        </div>
        <span class="auth-card__eyebrow">Безопасность</span>
        <h1>Забыли пароль?</h1>
        <p class="auth-subhead">Укажите email аккаунта — если он существует, мы отправим ссылку для сброса.</p>

        <div class="alert error" id="error" hidden></div>
        <div class="alert success" id="success" hidden></div>

        <form class="auth-form" id="auth-form">
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" required autocomplete="username" placeholder="name@company.com" />
          </div>
          <button type="submit" class="btn btn--primary" id="submit">Отправить ссылку</button>
        </form>

        <p class="auth-links">
          <a href="/login.html">Назад ко входу</a>
        </p>
      </section>
    </main>
  </div>
  <script type="module" src="/src/forgot-password.js"></script>
</body>
</html>

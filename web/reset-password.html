<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Новый пароль</title>
  <link rel="stylesheet" href="/src/auth.css" />
</head>
<body class="auth-page auth-page--reset">
  <div class="auth-layout">
    <aside class="auth-brand">
      <div class="auth-brand__logo">
        <span class="auth-brand__mark">Y</span>
        <span>YClients Portal</span>
      </div>
      <div class="auth-brand__content">
        <h2>Новый пароль</h2>
        <p>Выберите надёжный пароль, который не используете на других сайтах.</p>
      </div>
    </aside>

    <main class="auth-panel">
      <section class="auth-card">
        <div class="auth-mobile-logo">
          <span class="auth-brand__mark">Y</span>
          <span>YClients Portal</span>
        </div>
        <span class="auth-card__eyebrow">Сброс пароля</span>
        <h1>Задайте новый пароль</h1>
        <p class="auth-subhead">После сохранения вы сможете войти с новыми данными.</p>

        <div class="alert error" id="error" hidden></div>
        <div class="alert success" id="success" hidden></div>

        <form class="auth-form" id="auth-form">
          <div class="field">
            <label for="password">Новый пароль</label>
            <input type="password" id="password" required minlength="8" autocomplete="new-password" placeholder="Не менее 8 символов" />
          </div>
          <button type="submit" class="btn btn--primary" id="submit">Сохранить пароль</button>
        </form>
      </section>
    </main>
  </div>
  <script type="module" src="/src/reset-password.js"></script>
</body>
</html>

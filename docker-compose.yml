x-app-base: &app-base
  build:
    context: .
    dockerfile: Dockerfile
  image: yclients_bi_system-app:local
  env_file:
    - .env
  environment:
    DB_HOST: postgres
    DB_PORT: 5432
  volumes:
    - ./logs:/app/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-yclients_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    <<: *app-base
    command: ["api"]
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 5

  worker:
    <<: *app-base
    command: ["worker"]
    restart: unless-stopped

  migrate:
    <<: *app-base
    command: ["migrate"]
    restart: "no"

  sync:
    <<: *app-base
    profiles: ["tools"]
    entrypoint: ["/app/docker/entrypoint.sh", "sync"]
    command: ["--mode", "incremental", "--trigger", "manual", "--initiator", "docker"]
    restart: "no"

  analytics:
    <<: *app-base
    profiles: ["tools"]
    entrypoint: ["/app/docker/entrypoint.sh", "setup-analytics"]
    command: []
    restart: "no"

  metabase:
    # Optional: internal BI only. Remove this service and nginx -> metabase proxy if you ship
    # the product dashboard without Metabase (see README "Metabase").
    image: metabase/metabase:latest
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${MB_DB_NAME:-metabase_app}
      MB_DB_PORT: 5432
      MB_DB_USER: ${DB_USER:-postgres}
      MB_DB_PASS: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      MB_DB_HOST: postgres
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    profiles: ["prod"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_data:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
      metabase:
        condition: service_started
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    profiles: ["prod"]
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot_data:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  pg_data:
  metabase_data:
  certbot_data:
